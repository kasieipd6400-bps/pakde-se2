# nixpacks.toml

providers = ["php"]

[phases.setup]
nixPkgs = ["php83", "nodejs_22", "nginx"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs", "npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
# We add 'rm -f /etc/nginx/conf.d/default.conf' to remove the conflict
cmd = "php artisan migrate --force && rm -f /etc/nginx/conf.d/default.conf && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /etc/nginx.conf && php-fpm -D && nginx -c /etc/nginx.conf -g 'daemon off;'"

[variables]
NIXPACKS_PROVIDERS = "php"
NIXPACKS_PHP_ROOT_DIR = "/app/public"
IS_STATIC_SITE = "false"
