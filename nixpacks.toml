providers = ["php"]

[phases.setup]
nixPkgs = ["php83", "nodejs_22", "nginx"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs", "npm ci"]

[phases.build]
# We only build here. If this fails, check the 'Logs' for Vite errors.
cmds = ["npm run build"]

[start]
# Use the default Nixpacks Nginx config but ensure migrations run
cmd = "php artisan migrate --force && php-fpm -D && nginx -g 'daemon off;'"

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"
IS_STATIC_SITE = "false"
NODE_ENV = "production"
