# nixpacks.toml

providers = ["php"]

[phases.setup]
nixPkgs = ["php83", "nodejs_22", "nginx"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs", "npm ci"]

[phases.build]
# Build Vite assets and ensure the Nginx config directory is clean
cmds = ["npm run build", "rm -rf /etc/nginx/conf.d/default.conf"]

[start]
# We remove any leftover default configs and start the services manually
cmd = "rm -f /etc/nginx/conf.d/default.conf && php artisan migrate --force && php-fpm -D && nginx -g 'daemon off;'"

[variables]
NIXPACKS_PROVIDERS = "php"
# This is the most important variable to override the 'dist' behavior
NIXPACKS_PHP_ROOT_DIR = "/app/public"
IS_STATIC_SITE = "false"
