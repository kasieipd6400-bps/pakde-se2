providers = ["php"]

[phases.setup]
nixPkgs = ["php83", "nodejs_22", "nginx"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs", "npm ci"]

[phases.build]
# Just build. Do not touch any system files here.
cmds = ["npm run build"]

[start]
# We only fix the Nginx conflict at the very moment the container starts.
cmd = "rm -f /etc/nginx/conf.d/default.conf && php artisan migrate --force && php-fpm -D && nginx -g 'daemon off;'"

[variables]
NIXPACKS_PROVIDERS = "php"
NIXPACKS_PHP_ROOT_DIR = "/app/public"
IS_STATIC_SITE = "false"
