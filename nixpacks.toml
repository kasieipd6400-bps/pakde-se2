providers = ["php"]

[phases.setup]
# The fix: using the exact Nixpkgs attribute for Composer
nixPkgs = ["php83", "php83Packages.composer", "nodejs_22", "nginx"]

[phases.install]
cmds = [
    "composer install --ignore-platform-reqs --no-interaction",
    "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
# We use 'start-php-fpm' which is a Nixpacks helper that handles the config paths
cmd = "rm -f /etc/nginx/conf.d/default.conf && php artisan config:clear && php artisan migrate --force && (php-fpm -y /etc/php-fpm.conf -D || php-fpm -D) && nginx -g 'daemon off;'"

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"
IS_STATIC_SITE = "false"
