providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.install]
    # Standard installation of dependencies
    cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm ci"]

[phases.build]
    # Build your Vite assets
    cmds = ["npm run build"]

# WE ARE SKIPPING MIGRATIONS ENTIRELY
# WE ARE REMOVING THE [start] SECTION ENTIRELY
# This forces Nixpacks to use its own working default start command.
