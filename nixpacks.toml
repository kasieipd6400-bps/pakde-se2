[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_22", "nginx"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
# We start PHP and Nginx manually, just like a real server.
# This bypasses the 'duplicate location' error because we use our OWN config.
cmd = "php-fpm -D && nginx -c /app/nginx.conf -g 'daemon off;'"
