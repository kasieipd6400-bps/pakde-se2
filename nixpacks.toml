providers = ["php"]

[phases.setup]
# The fix: using the exact Nixpkgs attribute for Composer
nixPkgs = ["php83", "php83Packages.composer", "nodejs_22", "nginx"]

[phases.install]
cmds = [
    "composer install --ignore-platform-reqs --no-interaction",
    "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "rm -f /etc/nginx/conf.d/default.conf && php artisan migrate --force && php-fpm -D && nginx -g 'daemon off;'"

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"
IS_STATIC_SITE = "false"
