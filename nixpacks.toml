providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"
    NIXPACKS_NO_PHP_NGINX = "false"

[phases.install]
    cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm ci"]

[phases.build]
    cmds = ["npm run build"]

[start]
    # We move the default config to a backup name so it doesn't conflict
    # Then we run the Nixpacks PHP-FPM helper
    cmd = "mv /etc/nginx/conf.d/default.conf /etc/nginx/conf.d/default.conf.bak 2>/dev/null || true && /usr/local/bin/nixpacks-php-fpm"
