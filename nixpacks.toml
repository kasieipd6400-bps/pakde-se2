providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.install]
    cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm ci"]

[phases.build]
    # We delete the conflicting default config here during the build.
    # This leaves the paths for nixpacks-php-fpm completely untouched.
    cmds = [
        "npm run build",
        "rm -f /etc/nginx/conf.d/default.conf"
    ]

# !!! IMPORTANT !!!
# DELETE the [start] section entirely from your file.
# This allows Nixpacks to use its internal paths for PHP and Nginx.
