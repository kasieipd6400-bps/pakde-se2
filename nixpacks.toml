providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.install]
    cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm ci"]

[phases.build]
    cmds = ["npm run build"]

[start]
    # 1. 'rm' is safer than 'mv' for getting rid of the duplicate config.
    # 2. We use 'nixpacks-php-fpm' without a hardcoded path.
    # 3. If that fails, we fallback to the standard 'php-fpm' + 'nginx' start.
    cmd = "rm -f /etc/nginx/conf.d/default.conf && (nixpacks-php-fpm || (php-fpm -D && nginx -g 'daemon off;'))"
