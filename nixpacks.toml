providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"
    IS_STATIC_SITE = "false"

[phases.setup]
    nixPkgs = ["php83", "php83Packages.composer", "nodejs_22", "nginx"]

[phases.install]
    cmds = [
        "composer install --ignore-platform-reqs --no-interaction",
        "npm ci"
    ]

[phases.build]
    cmds = ["npm run build"]

# We use the 'build' phase to ensure the DB is ready for a quick check,
# but we avoid running the full migrate here to prevent exit 255.
[phases.postBuild]
    cmds = [
        "php artisan config:cache",
        "php artisan route:cache"
    ]

# IMPORTANT: Remove the [start] section entirely.
# By removing it, Nixpacks will automatically find its own 'start.sh' 
# or 'nixpacks-php-fpm' and run it correctly.
