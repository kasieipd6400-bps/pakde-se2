providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"
    # Prevents Node and PHP providers from fighting over Nginx
    IS_STATIC_SITE = "false"

[phases.setup]
    nixPkgs = ["php83", "php83Packages.composer", "nodejs_22", "nginx"]

[phases.install]
    cmds = [
        "composer install --ignore-platform-reqs --no-interaction",
        "npm ci"
    ]

[phases.build]
    cmds = ["npm run build"]

[start]
    # This runs migrations first, then calls the built-in startup script
    # /assets/start.sh is the standard Nixpacks entrypoint for PHP
    cmd = "php artisan migrate --force && bash /assets/start.sh"
