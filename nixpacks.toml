providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.install]
    cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm ci"]

[phases.build]
    cmds = ["npm run build"]

[phases.setup]
    # We use the setup phase to create a script that will 
    # clean up the Nginx config every time the container starts.
    cmds = ["echo 'rm -f /etc/nginx/conf.d/default.conf' > /etc/prestart.sh && chmod +x /etc/prestart.sh"]

# WE ARE NOT OVERRIDING [start].
# Instead, we are going to use the Coolify UI to trigger our cleanup.
