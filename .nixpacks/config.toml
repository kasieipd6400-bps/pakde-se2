# .nixpacks/config.toml

[phases.setup]
# Use Node.js 22 (required by Vite 8, Tailwind Oxide, Laravel Vite plugin)
nixPkgs = ["nodejs-22_x", "php83", "composer"]

[phases.install]
# Install PHP dependencies
cmds = ["composer install --no-dev --optimize-autoloader"]

# Install Node dependencies
cmds = ["npm ci"]

[phases.build]
# Build frontend assets with Vite
cmds = ["npm run build"]

[phases.start]
# Start Laravel with PHP artisan serve (Coolify will map ports)
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
