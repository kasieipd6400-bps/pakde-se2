providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"
    # This prevents the static provider from clashing with the PHP provider
    IS_STATIC_SITE = "false"

[phases.setup]
    nixPkgs = ["php83", "php83Packages.composer", "nodejs_22", "nginx"]

[phases.install]
    cmds = [
        "composer install --ignore-platform-reqs --no-interaction",
        "npm ci"
    ]

[phases.build]
    cmds = ["npm run build"]

# Use setup or postBuild for migrations to keep the [start] command clean
[phases.postBuild]
    cmds = [
        "php artisan config:cache",
        "php artisan route:cache",
        "php artisan view:cache"
    ]

[start]
    # We call 'php artisan migrate' and then the internal nixpacks-php-fpm start script.
    # This ensures PHP-FPM and Nginx find their correct internal config files.
    cmd = "php artisan migrate --force && nixpacks-php-fpm"
