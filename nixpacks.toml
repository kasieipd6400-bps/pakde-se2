providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"
    NIXPACKS_NO_PHP_NGINX = "false"

[phases.install]
    cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm ci"]

[phases.build]
    cmds = ["npm run build"]

[start]
    # 1. We use 'sed' to delete the extra 'location /' block that Coolify is forcing.
    # 2. We then call the full path to the nixpacks-php-fpm helper to avoid Error 127.
    cmd = "sed -i '/location \\/ {/,/}/d' /etc/nginx/nginx.conf && /usr/local/bin/nixpacks-php-fpm"
