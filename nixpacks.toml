providers = ["php"]

[variables]
    # This is the only variable Nixpacks needs to correctly 
    # configure Nginx for a Laravel project.
    NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.install]
    cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm ci"]

[phases.build]
    cmds = ["npm run build"]

# DO NOT add a [start] section.
# DO NOT add a [phases.setup] section.
