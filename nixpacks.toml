providers = ["php"]

[variables]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"
    IS_STATIC_SITE = "false"

[phases.setup]
    nixPkgs = ["php83", "php83Packages.composer", "nodejs_22", "nginx"]

[phases.install]
    cmds = [
        "composer install --ignore-platform-reqs --no-interaction",
        "npm ci"
    ]

[phases.build]
    cmds = ["npm run build"]

# REMOVE the postBuild section entirely. 
# We don't want artisan running in the 'isolated' build environment.

[start]
    # This runs at RUNTIME when the DB is actually available.
    cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && nixpacks-php-fpm"
